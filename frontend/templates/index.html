<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCCC Club Rides</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/map.css" />
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>WCCC Club Rides</h1>
      <p id="date-range"></p>
      <div id="range-selector">
        <button class="range-btn active" data-range="week">1 Week</button>
        <button class="range-btn" data-range="month">1 Month</button>
        <button class="range-btn" data-range="custom">Custom</button>
      </div>
      <div id="custom-range">
        <input type="date" id="from-date" />
        <span class="range-sep">–</span>
        <input type="date" id="to-date" />
        <button id="apply-range">Apply</button>
      </div>
    </div>
    <div id="ride-list">Loading rides…</div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
