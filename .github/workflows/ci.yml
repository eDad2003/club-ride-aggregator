name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper deps
        run: pip install -r scraper/requirements.txt

      - name: Lint (scraper)
        run: ruff check scraper/

      - name: Lint (api)
        run: |
          pip install -r api/requirements.txt
          ruff check api/

      - name: Run tests
        run: pytest scraper/tests/ -v
