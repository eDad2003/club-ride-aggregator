# Local development — builds the combined image locally
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.combined
    env_file: .env
    volumes:
      - db-data:/data
      - ./scraper:/app/scraper     # live reload
      - ./api:/app/api
      - ./frontend:/app/frontend
    ports:
      - "5003:5003"
    restart: unless-stopped

volumes:
  db-data:
    driver: local
